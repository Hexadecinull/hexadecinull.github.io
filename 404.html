<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Not Found | Hexadecinull</title>
  <link rel="icon" href="https://hexadecinull.github.io/assets/favicon.ico">
  <link rel="stylesheet" href="https://hexadecinull.github.io/assets/css/styles.css">
  <link rel="preload" as="font" href="https://hexadecinull.github.io/assets/fonts/mojangles.ttf" type="font/ttf" crossorigin>
  <style>
    #ms-wrap {
      display: inline-block;
      margin-top: 1.5rem;
      user-select: none;
    }
    #ms-hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b0d12;
      border: 1px solid #1a1f30;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      padding: 0.5rem 1rem;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      color: #3d5a8a;
      min-width: 270px;
    }
    body.light #ms-hud {
      background: #eef0f5;
      border-color: #c8cedc;
      color: #2c4a78;
    }
    #ms-face {
      font-size: 1.4rem;
      cursor: pointer;
      transition: transform 0.1s;
      background: none;
      border: none;
      padding: 0 0.3rem;
    }
    #ms-face:hover { transform: scale(1.15); }
    #ms-grid {
      display: inline-grid;
      grid-template-columns: repeat(9, 30px);
      gap: 2px;
      background: #0b0d12;
      border: 1px solid #1a1f30;
      border-radius: 0 0 8px 8px;
      padding: 6px;
    }
    body.light #ms-grid {
      background: #eef0f5;
      border-color: #c8cedc;
    }
    .ms-cell {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      border: none;
      outline: none;
      transition: background 0.08s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .ms-cell.hidden {
      background: #1c2235;
      color: #3d5a8a;
    }
    .ms-cell.hidden:hover {
      background: #243050;
    }
    body.light .ms-cell.hidden {
      background: #c8cedc;
      color: #2c4a78;
    }
    body.light .ms-cell.hidden:hover {
      background: #b0b8cc;
    }
    .ms-cell.revealed {
      background: #0b0d12;
      cursor: default;
    }
    body.light .ms-cell.revealed {
      background: #dde0e8;
      cursor: default;
    }
    .ms-cell.flagged {
      background: #1c2235;
    }
    body.light .ms-cell.flagged {
      background: #c8cedc;
    }
    .ms-cell.mine-hit {
      background: #3a0a0a;
    }
    .ms-cell.mine-revealed {
      background: #0b0d12;
      color: #555;
    }
    body.light .ms-cell.mine-revealed {
      background: #dde0e8;
    }
    .n1 { color: #5b9bd5; }
    .n2 { color: #4caf6e; }
    .n3 { color: #e05555; }
    .n4 { color: #3f5fbf; }
    .n5 { color: #a03030; }
    .n6 { color: #2a8a8a; }
    .n7 { color: #9a9a9a; }
    .n8 { color: #666; }
  </style>
</head>
<body>
  <div class="main-container" style="text-align:center;">
    <h1 style="font-family:'Mojangles',sans-serif;font-size:2.2rem;margin-top:3rem;">404 — Not Found</h1>
    <p style="font-size:1.05rem;margin:1.2rem auto 1.7rem;max-width:440px;opacity:0.75;">
      This page does not exist.<br>
      Play a round of Minesweeper while you're here.
    </p>
    <button class="action-btn" onclick="startGame()">💣 Play Minesweeper</button>

    <div id="game-container" style="display:none;margin-top:2rem;">
      <div id="ms-wrap">
        <div id="ms-hud">
          <span id="ms-mines">💣 10</span>
          <button id="ms-face" onclick="startGame()">😐</button>
          <span id="ms-timer">⏱ 0</span>
        </div>
        <div id="ms-grid"></div>
      </div>
      <p style="font-size:0.8rem;opacity:0.45;margin-top:0.8rem;">Left click: reveal &nbsp;|&nbsp; Right click / long press: flag</p>
    </div>

    <p style="margin-top:2.5rem;"><a href="/" class="repo-link">← Back to Home</a></p>
  </div>

  <script>
    const ROWS = 9, COLS = 9, TOTAL_MINES = 10;
    let board, revealed, flagged, gameOver, gameWon, firstClick, timerInterval, seconds, flagCount;

    const NUM_COLORS = ['', 'n1', 'n2', 'n3', 'n4', 'n5', 'n6', 'n7', 'n8'];

    function startGame() {
      document.getElementById('game-container').style.display = 'block';
      clearInterval(timerInterval);
      board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
      revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
      flagged = Array.from({length: ROWS}, () => Array(COLS).fill(false));
      gameOver = false;
      gameWon = false;
      firstClick = true;
      seconds = 0;
      flagCount = 0;
      document.getElementById('ms-face').textContent = '😐';
      document.getElementById('ms-timer').textContent = '⏱ 0';
      document.getElementById('ms-mines').textContent = '💣 ' + TOTAL_MINES;
      renderGrid();
    }

    function placeMines(safeR, safeC) {
      let placed = 0;
      while (placed < TOTAL_MINES) {
        const r = Math.floor(Math.random() * ROWS);
        const c = Math.floor(Math.random() * COLS);
        if (board[r][c] !== -1 && !(r === safeR && c === safeC)) {
          board[r][c] = -1;
          placed++;
        }
      }
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c] === -1) continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
            }
          }
          board[r][c] = count;
        }
      }
    }

    function floodReveal(startR, startC) {
      const queue = [[startR, startC]];
      while (queue.length > 0) {
        const [r, c] = queue.shift();
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
        if (revealed[r][c] || flagged[r][c]) continue;
        revealed[r][c] = true;
        if (board[r][c] === 0) {
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              queue.push([r + dr, c + dc]);
            }
          }
        }
      }
    }

    function handleReveal(r, c) {
      if (gameOver || gameWon || revealed[r][c] || flagged[r][c]) return;
      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        timerInterval = setInterval(() => {
          seconds++;
          document.getElementById('ms-timer').textContent = '⏱ ' + seconds;
        }, 1000);
      }
      if (board[r][c] === -1) {
        revealed[r][c] = true;
        gameOver = true;
        clearInterval(timerInterval);
        revealAllMines(r, c);
        document.getElementById('ms-face').textContent = '💥';
        renderGrid();
        return;
      }
      floodReveal(r, c);
      renderGrid();
      checkWin();
    }

    function handleFlag(r, c) {
      if (gameOver || gameWon || revealed[r][c]) return;
      flagged[r][c] = !flagged[r][c];
      flagCount += flagged[r][c] ? 1 : -1;
      document.getElementById('ms-mines').textContent = '💣 ' + (TOTAL_MINES - flagCount);
      renderGrid();
    }

    function revealAllMines(hitR, hitC) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c] === -1) revealed[r][c] = true;
        }
      }
    }

    function checkWin() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!revealed[r][c] && board[r][c] !== -1) return;
        }
      }
      gameWon = true;
      clearInterval(timerInterval);
      document.getElementById('ms-face').textContent = '😎';
      setTimeout(() => alert('You cleared the board! Time: ' + seconds + 's'), 80);
    }

    let longPressTimer = null;

    function renderGrid() {
      const grid = document.getElementById('ms-grid');
      grid.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'ms-cell';
          const isMine = board[r][c] === -1;
          const isRevealed = revealed[r][c];
          const isFlagged = flagged[r][c];

          if (isRevealed) {
            if (isMine) {
              cell.classList.add(gameOver && cell ? 'mine-hit' : 'mine-revealed');
              cell.textContent = '💣';
            } else {
              cell.classList.add('revealed');
              const n = board[r][c];
              if (n > 0) {
                cell.textContent = n;
                cell.classList.add(NUM_COLORS[n]);
              }
            }
          } else if (isFlagged) {
            cell.classList.add('hidden', 'flagged');
            cell.textContent = '🚩';
          } else {
            cell.classList.add('hidden');
          }

          const cr = r, cc = c;

          cell.addEventListener('click', () => handleReveal(cr, cc));
          cell.addEventListener('contextmenu', e => { e.preventDefault(); handleFlag(cr, cc); });

          cell.addEventListener('touchstart', e => {
            longPressTimer = setTimeout(() => {
              longPressTimer = null;
              handleFlag(cr, cc);
            }, 500);
          }, { passive: true });

          cell.addEventListener('touchend', () => {
            if (longPressTimer !== null) {
              clearTimeout(longPressTimer);
              longPressTimer = null;
            }
          });

          cell.addEventListener('touchmove', () => {
            if (longPressTimer !== null) {
              clearTimeout(longPressTimer);
              longPressTimer = null;
            }
          }, { passive: true });

          grid.appendChild(cell);
        }
      }
    }

    document.addEventListener('touchend', () => {
      if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
        document.activeElement.blur();
      }
    }, { passive: true });
  </script>
</body>
</html>
